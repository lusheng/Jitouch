name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Debug App
        run: xcodebuild -project Jitouch.xcodeproj -scheme Jitouch -configuration Debug -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

      - name: Run Unit Tests
        run: xcodebuild -project Jitouch.xcodeproj -scheme Jitouch -configuration Debug -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO test
