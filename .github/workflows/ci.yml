name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      XCODEGEN_VERSION: 2.45.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          tmpdir="$(mktemp -d)"
          curl -L "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" -o "$tmpdir/xcodegen.zip"
          unzip -q "$tmpdir/xcodegen.zip" -d "$tmpdir"
          PREFIX="$HOME/.local" "$tmpdir/xcodegen/install.sh"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          xcodegen --version

      - name: Show Selected Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Debug App
        run: xcodebuild -project Jitouch.xcodeproj -scheme Jitouch -configuration Debug -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

      - name: Run Unit Tests
        run: xcodebuild -project Jitouch.xcodeproj -scheme Jitouch -configuration Debug -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO test
